# fly.toml app configuration file generated for pinged-restock on 2026-06-16T16:01:50+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pinged-restock'
primary_region = 'nrt'

[build]

[env]
  PORT = '3000'
  SCOPES = 'read_inventory,read_products'
  SHOPIFY_API_KEY = '4b71825a9e5bcd35e35796a4b422a79c'
  SHOPIFY_APP_URL = 'https://pinged-restock.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run docker-start'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
