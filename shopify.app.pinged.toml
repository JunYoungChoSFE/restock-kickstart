# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4b71825a9e5bcd35e35796a4b422a79c"
name = "Pinged"
application_url = "https://pinged-restock.fly.dev"
embedded = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Billing: 구독 상태 변화 시 플랜(free/pro) 동기화
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions_update"
  topics = [ "app_subscriptions/update" ]

  # 재입고 감지 → 발송 큐
  [[webhooks.subscriptions]]
  uri = "/webhooks/inventory"
  topics = [ "inventory_levels/update" ]

  # GDPR 필수 3종 (단일 핸들러)
  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [
    "customers/data_request",
    "customers/redact",
    "shop/redact",
  ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_products"

[auth]
redirect_urls = [
  "https://pinged-restock.fly.dev/auth/callback",
  "https://pinged-restock.fly.dev/auth/shopify/callback",
  "https://pinged-restock.fly.dev/api/auth/callback"
]

# 스토어프론트 "입고 알림" 버튼 → 신청 캡처.
#   /apps/pinged/subscribe → 앱 /proxy/subscribe (proxy.subscribe.tsx)
[app_proxy]
url = "https://pinged-restock.fly.dev/proxy"
prefix = "apps"
subpath = "pinged"

[build]
automatically_update_urls_on_dev = true
