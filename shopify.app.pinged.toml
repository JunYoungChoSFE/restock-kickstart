# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4b71825a9e5bcd35e35796a4b422a79c"
name = "Pinged"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # 재입고 감지 → 발송 큐
  [[webhooks.subscriptions]]
  uri = "/webhooks/inventory"
  topics = [ "inventory_levels/update" ]

  # GDPR 필수 3종 (단일 핸들러)
  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [
    "customers/data_request",
    "customers/redact",
    "shop/redact",
  ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_products"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

# 스토어프론트 "입고 알림" 버튼 → 신청 캡처.
#   /apps/pinged/subscribe → 앱 /proxy/subscribe (proxy.subscribe.tsx)
[app_proxy]
url = "https://shopify.dev/apps/default-app-home/proxy"
prefix = "apps"
subpath = "pinged"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
